<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Credlink - P2P Lending Platform</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <div class="auth-container">
        <!-- Login Form -->
        <div id="loginForm" class="auth-form active">
            <div class="form-header">
                <h1>Credlink</h1>
                <p>Connect, Lend, Grow</p>
            </div>
            
            <form id="login-form" class="form-content">
                <div class="form-group">
                    <label for="login-email">Email Address</label>
                    <input 
                        type="email" 
                        id="login-email" 
                        name="email" 
                        placeholder="Enter your email"
                        required
                    >
                    <span class="error-message" id="login-email-error"></span>
                </div>

                <div class="form-group">
                    <label for="login-password">Password</label>
                    <div class="password-field">
                        <input 
                            type="password" 
                            id="login-password" 
                            name="password" 
                            placeholder="Enter your password"
                            required
                        >
                        <button type="button" class="toggle-password" onclick="togglePassword('login-password')">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                    <span class="error-message" id="login-password-error"></span>
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="remember-me" name="rememberMe">
                    <label for="remember-me">Remember me</label>
                </div>

                <button type="submit" class="btn-primary">Login</button>
                
                <div class="form-divider">
                    <span>Or</span>
                </div>

                <button type="button" class="btn-secondary btn-google" onclick="loginWithGoogle()">
                    <span>🔐</span> Login with Google
                </button>
            </form>

            <div class="form-footer">
                <p>Don't have an account? 
                    <a href="#" onclick="toggleForms(); return false;">Sign up here</a>
                </p>
                <p><a href="#" class="forgot-password">Forgot your password?</a></p>
            </div>
        </div>

        <!-- Signup Form -->
        <div id="signupForm" class="auth-form">
            <div class="form-header">
                <h1>Credlink</h1>
                <p>Start Your Lending Journey</p>
            </div>

            <form id="signup-form" class="form-content">
                <div class="form-row">
                    <div class="form-group">
                        <label for="signup-firstname">First Name</label>
                        <input 
                            type="text" 
                            id="signup-firstname" 
                            name="firstName" 
                            placeholder="John"
                            required
                        >
                        <span class="error-message" id="firstname-error"></span>
                    </div>

                    <div class="form-group">
                        <label for="signup-lastname">Last Name</label>
                        <input 
                            type="text" 
                            id="signup-lastname" 
                            name="lastName" 
                            placeholder="Doe"
                            required
                        >
                        <span class="error-message" id="lastname-error"></span>
                    </div>
                </div>

                <div class="form-group">
                    <label for="signup-email">Email Address</label>
                    <input 
                        type="email" 
                        id="signup-email" 
                        name="email" 
                        placeholder="your.email@example.com"
                        required
                    >
                    <span class="error-message" id="signup-email-error"></span>
                </div>

                <div class="form-group">
                    <label for="signup-phone">Phone Number</label>
                    <input 
                        type="tel" 
                        id="signup-phone" 
                        name="phone" 
                        placeholder="+1 (555) 000-0000"
                        required
                    >
                    <span class="error-message" id="signup-phone-error"></span>
                </div>

                <div class="form-group">
                    <label for="signup-password">Password</label>
                    <div class="password-field">
                        <input 
                            type="password" 
                            id="signup-password" 
                            name="password" 
                            placeholder="Create a strong password"
                            required
                        >
                        <button type="button" class="toggle-password" onclick="togglePassword('signup-password')">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                    <div class="password-strength">
                        <div class="strength-bar" id="strength-bar"></div>
                    </div>
                    <span class="error-message" id="signup-password-error"></span>
                    <p class="password-hint" id="password-hint"></p>
                </div>

                <div class="form-group">
                    <label for="signup-confirm-password">Confirm Password</label>
                    <div class="password-field">
                        <input 
                            type="password" 
                            id="signup-confirm-password" 
                            name="confirmPassword" 
                            placeholder="Confirm your password"
                            required
                        >
                        <button type="button" class="toggle-password" onclick="togglePassword('signup-confirm-password')">
                            <span class="eye-icon">👁️</span>
                        </button>
                    </div>
                    <span class="error-message" id="confirm-password-error"></span>
                </div>

                <div class="form-group checkbox">
                    <input type="checkbox" id="terms" name="terms" required>
                    <label for="terms">I agree to the <a href="#">Terms of Service</a> and <a href="#">Privacy Policy</a></label>
                    <span class="error-message" id="terms-error"></span>
                </div>

                <button type="submit" class="btn-primary">Create Account</button>

                <div class="form-divider">
                    <span>Or</span>
                </div>

                <button type="button" class="btn-secondary btn-google" onclick="signupWithGoogle()">
                    <span>🔐</span> Sign up with Google
                </button>
            </form>

            <div class="form-footer">
                <p>Already have an account? 
                    <a href="#" onclick="toggleForms(); return false;">Login here</a>
                </p>
            </div>
        </div>

        <!-- Success Message -->
        <div id="successMessage" class="success-message" style="display: none;">
            <div class="success-content">
                <div class="success-icon">✓</div>
                <h2 id="success-title">Account Created Successfully!</h2>
                <p id="success-text">Welcome to Credlink. Redirecting to dashboard...</p>
            </div>
        </div>
    </div>

    <script src="js/auth.js"></script>
</body>
</html>
